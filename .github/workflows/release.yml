name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-hx:
    name: Build patched hx (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_os: linux
            asset_arch: amd64
          - os: ubuntu-22.04-arm
            asset_os: linux
            asset_arch: arm64
          - os: windows-latest
            asset_os: windows
            asset_arch: amd64
          - os: macos-13
            asset_os: darwin
            asset_arch: amd64
          - os: macos-14
            asset_os: darwin
            asset_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build hx
        shell: bash
        run: |
          cd helix
          cargo build --release --locked
      - name: Stage hx
        shell: bash
        run: |
          mkdir -p hx-dist
          if [ "${{ matrix.asset_os }}" = "windows" ]; then
            cp helix/target/release/hx.exe hx-dist/hx.exe
          else
            cp helix/target/release/hx hx-dist/hx
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hx_${{ matrix.asset_os }}_${{ matrix.asset_arch }}
          path: hx-dist/

  goreleaser:
    name: Release helix-copilot CLI
    needs: build-hx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: hx_*
          path: hx-artifacts
      - name: Organize hx binaries by platform
        shell: bash
        run: |
          mkdir -p hx-assets
          for dir in hx-artifacts/hx_*; do
            platform=$(basename "$dir" | sed 's/^hx_//')
            mkdir -p "hx-assets/${platform}"
            cp "$dir"/* "hx-assets/${platform}/"
          done
          find hx-assets -type f | sort
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
