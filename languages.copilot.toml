# Generated by helix-copilot. Merge with your existing languages.toml if needed.
[language-server.copilot]
command = "helix-copilot"
args = ["lsp"]

# ===== C/C++ =====
[[language]]
name = "c"
scope = "source.c"
file-types = ["c"]
language-servers = ["clangd", "copilot"]

[[language]]
name = "cpp"
scope = "source.cpp"
file-types = ["cc", "hh", "c++", "cpp", "hpp", "h", "ipp", "tpp", "cxx", "hxx", "ixx", "txx", "ino", "C", "H", "cu", "cuh"]
language-servers = ["clangd", "copilot"]

[[language]]
name = "c-sharp"
scope = "source.csharp"
file-types = ["cs", "csx"]
language-servers = ["copilot"]

# ===== Go =====
[[language]]
name = "go"
scope = "source.go"
file-types = ["go"]
language-servers = ["gopls", "copilot"]

# ===== Java =====
[[language]]
name = "java"
scope = "source.java"
file-types = ["java"]
language-servers = ["copilot"]

# ===== JavaScript / TypeScript =====
[[language]]
