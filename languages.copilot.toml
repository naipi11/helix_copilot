# Generated by helix-copilot. Merge with your existing languages.toml if needed.
# 支持所有 GitHub Copilot 官方支持的语言。
# 社区维护的语言支持列表：
# https://docs.github.com/en/copilot/managing-copilot/configure-personal-settings/managing-copilot-for-completion

[language-server.copilot]
command = "helix-copilot"
args = ["lsp"]

# ===== 常见语言 =====
[[language]]
name = "c"
language-servers = ["clangd", "copilot"]

[[language]]
name = "cpp"
language-servers = ["clangd", "copilot"]

[[language]]
name = "cs"
language-servers = ["copilot"]

[[language]]
name = "go"
language-servers = ["gopls", "copilot"]

[[language]]
name = "java"
language-servers = ["copilot"]

[[language]]
name = "javascript"
language-servers = ["typescript-language-server", "copilot"]
auto-format = true

[[language]]
name = "jsx"
language-servers = ["typescript-language-server", "copilot"]
auto-format = true

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "copilot"]
auto-format = true

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "copilot"]
auto-format = true

[[language]]
name = "python"
language-servers = ["pyright-langserver", "copilot"]
auto-format = true

[[language]]
name = "ruby"
language-servers = ["solargraph", "copilot"]
